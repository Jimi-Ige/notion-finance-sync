<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Finance Sync — Link Bank Account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #fafafa; color: #333;
    }
    .container { text-align: center; max-width: 480px; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; line-height: 1.5; }
    .status { font-size: 1.1rem; margin-top: 1rem; }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid #e5e7eb; border-top-color: #2563eb;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Notion Finance Sync</h1>
    <p>Connecting to Plaid to link your bank account...</p>
    <div id="status"><div class="spinner"></div></div>
  </div>

  <!-- Plaid Link vanilla JS drop-in (ref: plaid/tutorial-resources) -->
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <script>
    const statusEl = document.getElementById("status");

    function showMessage(text, type) {
      statusEl.innerHTML = `<p class="status ${type}">${text}</p>`;
    }

    (async function () {
      try {
        // 1. Get a link token from the local Express server
        const tokenRes = await fetch("/create-link-token", { method: "POST" });
        if (!tokenRes.ok) throw new Error("Failed to create link token");
        const { link_token } = await tokenRes.json();

        // 2. Open Plaid Link
        const handler = Plaid.create({
          token: link_token,
          onSuccess: async (publicToken, metadata) => {
            showMessage("Exchanging token...", "");
            try {
              const exchangeRes = await fetch("/exchange-token", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  public_token: publicToken,
                  institution_id: metadata.institution.institution_id,
                  institution_name: metadata.institution.name,
                }),
              });
              if (!exchangeRes.ok) throw new Error("Token exchange failed");

              const result = await exchangeRes.json();
              showMessage(
                `${result.institution} linked successfully!<br>` +
                `${result.accountCount} account(s) stored.<br><br>` +
                `You can close this tab.`,
                "success"
              );
            } catch (err) {
              showMessage(`Error: ${err.message}`, "error");
            }
          },
          onExit: (err) => {
            if (err) {
              showMessage(`Plaid Link exited: ${err.display_message || err.error_code}`, "error");
            } else {
              showMessage("Link cancelled. You can close this tab.", "");
            }
          },
        });

        handler.open();
      } catch (err) {
        showMessage(`Failed to initialize: ${err.message}`, "error");
      }
    })();
  </script>
</body>
</html>
